<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>пухососgame</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link class="apple-touch-icon" rel="apple-touch-icon" href="https://i.ibb.co/QvM6Vwh7/IMG-5993.jpg">

<style>
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    user-select: none; 
    -webkit-user-select: none; 
  }
  body, html { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    font-family: Arial, sans-serif; 
  }

  /* начальный экран выбора языка */
  #language-screen {
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background-color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    color: white;
  }
  #lang-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 25px;
    text-align: center;
    line-height: 1.4;
  }
  .lang-options {
    display: flex;
    gap: 15px;
    margin-bottom: 35px;
  }
  .lang-opt-btn {
    padding: 12px 24px;
    font-size: 18px;
    border: 2px solid white;
    background: transparent;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .lang-opt-btn.active {
    background-color: white;
    color: black;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
  }
  #btn-lang-confirm {
    background-color: #4caf50;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 14px 45px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  
  /* экран загрузки */
  #loading-screen {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background-color: blue; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    z-index: 1000;
  }
  #brand-puhosos {
    color: black; 
    font-size: 48px; 
    font-weight: bold;
    opacity: 0; 
    transition: opacity 2s ease-in-out; 
    margin-bottom: 10px;
  }
  #brand-game {
    color: black; 
    font-size: 36px; 
    font-weight: bold;
    opacity: 0; 
    transition: opacity 2s ease-in-out;
  }
  #progress-container {
    position: absolute; 
    bottom: 60px; 
    width: 80%; 
    height: 20px;
    background-color: rgba(255,255,255,0.2); 
    border-radius: 10px;
    overflow: hidden; 
    display: none;
  }
  #progress-bar {
    width: 0%; 
    height: 100%; 
    background-color: white;
    transition: width 0.4s linear;
  }

  /* главное меню */
  #menu-screen {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background: linear-gradient(270deg, #ff3333, #ff9933, #ffff33, #33cc33, #3333ff, #9933ff);
    background-size: 400% 400%;
    animation: rainbow 8s linear infinite;
    display: none; 
    align-items: center; 
    justify-content: center; 
    z-index: 500;
  }
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  #btn-play {
    background-color: yellow; 
    color: black; 
    font-size: 32px; 
    font-weight: bold;
    padding: 20px 50px; 
    border: none; 
    border-radius: 15px; 
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  
  /* кнопка магазин */
  #btn-shop {
    position: absolute; 
    top: 20px; 
    right: 20px;
    width: 65px; 
    height: 65px; 
    background-color: gray;
    border: 3px solid #444; 
    border-radius: 10px; 
    cursor: pointer;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 35px;
  }

  /* кнопка задания */
  #btn-tasks {
    position: absolute;
    top: 20px;
    left: 20px;
    background-color: gray;
    color: white;
    padding: 12px 20px;
    border: 3px solid #444;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* кнопка баланса */
  #balance-container {
    position: absolute; 
    bottom: 20px; 
    left: 20px;
    background-color: gray; 
    padding: 8px 12px; 
    border-radius: 10px;
    display: flex; 
    align-items: center; 
    border: 2px solid #444;
  }
  #balance-window {
    background-color: black; 
    padding: 5px 15px; 
    border-radius: 5px;
    min-width: 60px; 
    text-align: center; 
    margin-right: 8px;
  }
  #balance-text {
    color: white; 
    font-size: 20px; 
    font-weight: bold;
  }
  #balance-emoji {
    font-size: 24px;
    display: flex;
    align-items: center;
  }

  /* базовый стиль окон */
  .modal-overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background-color: rgba(0,0,0,0.8); 
    display: none;
    align-items: center; 
    justify-content: center; 
    z-index: 600;
  }

  /* окно магазина */
  #shop-content {
    background-color: #222; 
    padding: 30px; 
    border-radius: 15px;
    width: 90%; 
    max-width: 380px; 
    text-align: center; 
    border: 2px solid #fff;
    position: relative;
  }
  #shop-close {
    position: absolute; 
    top: 10px; 
    right: 15px; 
    color: white;
    font-size: 28px; 
    cursor: pointer;
  }
  #promo-title {
    color: white; 
    font-size: 20px; 
    font-weight: bold; 
    margin-bottom: 10px;
  }
  #promo-desc {
    color: gray; 
    font-size: 15px; 
    margin-bottom: 20px;
  }
  #btn-buy-promo {
    border: none;
    padding: 12px 20px; 
    font-size: 16px; 
    font-weight: bold;
    border-radius: 8px; 
    cursor: pointer; 
    width: 100%;
    transition: background-color 0.2s;
  }

  /* квадратное окно заданий */
  #tasks-content {
    background-color: gray;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 380px;
    aspect-ratio: 1 / 1; 
    text-align: center;
    border: 2px solid #fff;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  #tasks-close {
    position: absolute;
    top: -15px;
    right: -15px;
    background-color: red;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  #tasks-title {
    color: white;
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 5px;
  }
  #tasks-desc {
    color: #d1d1d1;
    font-size: 14px;
    margin-bottom: 15px;
    line-height: 1.3;
  }
  #tasks-list {
    flex: 1;
    overflow-y: auto;
    text-align: left;
    padding-right: 5px;
  }
  .task-card {
    background-color: #555;
    border: 1px solid #777;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    color: white;
  }
  .task-card.completed {
    background-color: #2e7d32;
    border-color: #4caf50;
  }
  .task-card-title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .task-card-progress {
    font-size: 12px;
    color: #ccc;
  }

  /* игровой экран */
  #game-screen {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    background-color: #b3e5fc; 
    display: none; 
    z-index: 100;
    touch-action: none;
  }
  #game-top-text {
    position: absolute; 
    top: 30px; 
    width: 100%; 
    text-align: center;
    color: black; 
    font-size: 26px; 
    font-weight: bold; 
    z-index: 10;
  }
  #game-bottom-text {
    position: absolute; 
    bottom: 30px; 
    width: 100%; 
    text-align: center;
    color: black; 
    font-size: 24px; 
    font-weight: bold; 
    z-index: 10;
  }
  #puhosos-img {
    position: absolute; 
    width: 110px; 
    height: auto;
    transform: translate(-50%, -50%) rotate(0deg);
    pointer-events: none; 
    z-index: 5;
    left: 50%;
    top: 50%;
    will-change: left, top, transform;
  }
  .snowflake {
    position: absolute; 
    font-size: 28px; 
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

  <div id="language-screen">
    <div id="lang-title">ВЫБЕРИТЕ ЯЗЫК<br>CHOOSE LANGUAGE</div>
    <div class="lang-options">
      <button id="lang-ru-btn" class="lang-opt-btn active">🇷🇺 Русский</button>
      <button id="lang-en-btn" class="lang-opt-btn">🇺🇸 English</button>
    </div>
    <button id="btn-lang-confirm">ВЫБРАТЬ / SELECT</button>
  </div>

  <div id="loading-screen">
    <div id="brand-puhosos">пухосос</div>
    <div id="brand-game">game</div>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="menu-screen">
    <div id="btn-tasks">📝 задания</div>
    <button id="btn-play">играть</button>
    <div id="btn-shop">🏬</div>
    
    <div id="balance-container">
      <div id="balance-window">
        <span id="balance-text">0</span>
      </div>
      <div id="balance-emoji">❄️</div>
    </div>
  </div>

  <div id="shop-modal" class="modal-overlay">
    <div id="shop-content">
      <div id="shop-close">&times;</div>
      <div id="promo-title">УСКОРИТЕЛЬ ЭТО СУПЕР!!!</div>
      <div id="promo-desc">купите 2x ускоритель для пухососа.</div>
      <button id="btn-buy-promo">Купить за 499 кусочков льда.</button>
    </div>
  </div>

  <div id="tasks-modal" class="modal-overlay">
    <div id="tasks-content">
      <div id="tasks-close">X</div>
      <div id="tasks-title">Задания</div>
      <div id="tasks-desc">Выполняйте задания и получайте в 3 раза больше снежков!</div>
      <div id="tasks-list"></div>
    </div>
  </div>

  <div id="game-screen">
    <div id="game-top-text">0/0</div>
    <img id="puhosos-img" src="https://i.ibb.co/RTPc9wDf/IMG-5992.jpg" alt="пухосос">
    <div id="game-bottom-text">0 ❄️ собрано.</div>
  </div>

<script>
  let iceBalance = 0;
  let scoreMultiplier = 1;
  let isMultiplierBought = false; 
  let randomTarget = 0;
  let currentMatchScore = 0;
  let isPlaying = false;
  let activeSnowflakes = [];
  let gameSpawnInterval;
  let playerTasks = [];
  let currentLang = 'ru'; // по умолчанию русский

  let currentX = window.innerWidth / 2;
  let currentY = window.innerHeight / 2;
  let targetX = window.innerWidth / 2;
  let targetY = window.innerHeight / 2;
  let currentAngle = 0;
  const moveSpeed = 0.04;

  const languageScreen = document.getElementById('language-screen');
  const langRuBtn = document.getElementById('lang-ru-btn');
  const langEnBtn = document.getElementById('lang-en-btn');
  const btnLangConfirm = document.getElementById('btn-lang-confirm');

  const loadingScreen = document.getElementById('loading-screen');
  const brandPuhosos = document.getElementById('brand-puhosos');
  const brandGame = document.getElementById('brand-game');
  const progressContainer = document.getElementById('progress-container');
  const progressBar = document.getElementById('progress-bar');

  const menuScreen = document.getElementById('menu-screen');
  const btnPlay = document.getElementById('btn-play');
  const btnShop = document.getElementById('btn-shop');
  const btnTasks = document.getElementById('btn-tasks');
  const balanceText = document.getElementById('balance-text');

  const shopModal = document.getElementById('shop-modal');
  const shopClose = document.getElementById('shop-close');
  const btnBuyPromo = document.getElementById('btn-buy-promo');
  const promoTitle = document.getElementById('promo-title');
  const promoDesc = document.getElementById('promo-desc');

  const tasksModal = document.getElementById('tasks-modal');
  const tasksClose = document.getElementById('tasks-close');
  const tasksListContainer = document.getElementById('tasks-list');
  const tasksTitle = document.getElementById('tasks-title');
  const tasksDesc = document.getElementById('tasks-desc');

  const gameScreen = document.getElementById('game-screen');
  const gameTopText = document.getElementById('game-top-text');
  const gameBottomText = document.getElementById('game-bottom-text');
  const puhososImg = document.getElementById('puhosos-img');

  // Словарь переводов
  const translations = {
    ru: {
      DOM_strings: {
        brandPuhosos: 'пухосос',
        brandGame: 'game',
        btnPlay: 'играть',
        btnTasks: '📝 задания',
        promoTitle: 'УСКОРИТЕЛЬ ЭТО СУПЕР!!!',
        promoDesc: 'купите 2x ускоритель для пухососа.',
        tasksTitle: 'Задания',
        tasksDesc: 'Выполняйте задания и получайте в 3 раза больше снежков!',
        gameBottomText: '0 ❄️ собрано.'
      },
      dynamic_strings: {
        shop_btn_buy: 'Купить за 499 кусочков льда.',
        shop_btn_bought: 'куплено',
        task_collect_pattern: 'собрать всего X ❄️ в матчах',
        task_round_pattern: 'успешно завершить X раундов',
        task_progress_prefix: 'прогресс: ',
        task_done: '✅ (готово!)',
        alert_booster_bought: 'ускоритель куплен на 1 следующий раунд! 🚀',
        alert_no_ice: 'недостаточно кусочков льда! собирай больше в бою ❄️',
        alert_task_done_title: '🎉 выполнено задание:',
        alert_task_bonus: '! получен бонус:',
        alert_all_tasks_done: '🏆 ты завершил все 10 заданий! получай новый список!',
        alert_win_prefix: 'победа! ты получил ',
        alert_win_suffix: ' снежков!'
      }
    },
    en: {
      DOM_strings: {
        brandPuhosos: 'puhosos',
        brandGame: 'game',
        btnPlay: 'play',
        btnTasks: '📝 tasks',
        promoTitle: 'SUPER BOOSTER!!!',
        promoDesc: 'Buy a 2x booster for Puhosos.',
        tasksTitle: 'Tasks',
        tasksDesc: 'Complete tasks and get 3 times more snowballs!',
        gameBottomText: '0 ❄️ collected.'
      },
      dynamic_strings: {
        shop_btn_buy: 'Buy for 499 ice chunks.',
        shop_btn_bought: 'bought',
        task_collect_pattern: 'Collect total X ❄️ in matches', 
        task_round_pattern: 'Successfully complete X rounds',
        task_progress_prefix: 'Progress: ',
        task_done: '✅ (done!)',
        alert_booster_bought: 'Booster bought for 1 next round! 🚀',
        alert_no_ice: 'Not enough ice chunks! Collect more in battle ❄️',
        alert_task_done_title: '🎉 Task completed:',
        alert_task_bonus: '! Received bonus:',
        alert_all_tasks_done: '🏆 You completed all 10 tasks! Get a new list!',
        alert_win_prefix: 'Victory! You received ',
        alert_win_suffix: ' snowballs!'
      }
    }
  };

  function t(type, key) {
    if (key === undefined) {
      return translations[currentLang][type];
    }
    return translations[currentLang][type][key];
  }

  function updateUIStrings() {
    brandPuhosos.textContent = t('DOM_strings', 'brandPuhosos');
    brandGame.textContent = t('DOM_strings', 'brandGame');
    btnPlay.textContent = t('DOM_strings', 'btnPlay');
    btnTasks.textContent = t('DOM_strings', 'btnTasks');
    promoTitle.textContent = t('DOM_strings', 'promoTitle');
    promoDesc.textContent = t('DOM_strings', 'promoDesc');
    tasksTitle.textContent = t('DOM_strings', 'tasksTitle');
    tasksDesc.textContent = t('DOM_strings', 'tasksDesc');
    gameBottomText.textContent = t('DOM_strings', 'gameBottomText');
    updateShopButtonState(); 
  }

  // Клики по кнопкам выбора языка
  langRuBtn.addEventListener('click', () => {
    currentLang = 'ru';
    langRuBtn.classList.add('active');
    langEnBtn.classList.remove('active');
  });

  langEnBtn.addEventListener('click', () => {
    currentLang = 'en';
    langEnBtn.classList.add('active');
    langRuBtn.classList.remove('active');
  });

  // Кнопка подтверждения выбора
  btnLangConfirm.addEventListener('click', () => {
    languageScreen.style.display = 'none'; // Скрываем выбор языка
    
    // Применяем язык и загружаем данные
    updateUIStrings();
    loadSavedData();
    updateMenuUI();

    // Запускаем полосу загрузки
    startLoadingSystem();
  });

  function loadSavedData() {
    const savedBalance = localStorage.getItem('puhosos_ice_balance');
    if (savedBalance !== null) iceBalance = parseInt(savedBalance);

    const savedTasks = localStorage.getItem('puhosos_saved_tasks');
    if (savedTasks !== null) {
      playerTasks = JSON.parse(savedTasks);
    } else {
      generateNewTasksList();
    }
  }

  function saveCurrentData() {
    localStorage.setItem('puhosos_ice_balance', iceBalance);
    localStorage.setItem('puhosos_saved_tasks', JSON.stringify(playerTasks));
  }

  function generateNewTasksList() {
    playerTasks = [];
    const types = ['collect', 'round'];
    const dynStrings = t('dynamic_strings');
    for (let i = 1; i <= 10; i++) {
      const type = types[Math.floor(Math.random() * types.length)];
      let textPattern = '';
      let target = 0;
      if (type === 'collect') {
        target = Math.floor(Math.random() * 81) + 40; 
        textPattern = dynStrings.task_collect_pattern;
      } else {
        target = Math.floor(Math.random() * 4) + 2; 
        textPattern = dynStrings.task_round_pattern;
      }
      playerTasks.push({
        id: i,
        type: type,
        text: textPattern.replace('X', target), 
        target: target,
        current: 0,
        completed: false
      });
    }
    saveCurrentData();
  }

  function renderTasks() {
    tasksListContainer.innerHTML = '';
    const dynStrings = t('dynamic_strings');
    playerTasks.forEach(task => {
      const card = document.createElement('div');
      card.className = `task-card ${task.completed ? 'completed' : ''}`;
      card.innerHTML = `
        <div class="task-card-title">${task.text}</div>
        <div class="task-card-progress">
          ${dynStrings.task_progress_prefix}${task.current} / ${task.target} ${task.completed ? dynStrings.task_done : ''}
        </div>
      `;
      tasksListContainer.appendChild(card);
    });
  }

  function updateShopButtonState() {
    const dynStrings = t('dynamic_strings');
    if (isMultiplierBought) {
      btnBuyPromo.style.backgroundColor = 'gray';
      btnBuyPromo.style.color = 'white';
      btnBuyPromo.textContent = dynStrings.shop_btn_bought;
      btnBuyPromo.disabled = true;
    } else {
      btnBuyPromo.style.backgroundColor = 'red';
      btnBuyPromo.style.color = 'white';
      btnBuyPromo.textContent = dynStrings.shop_btn_buy;
      btnBuyPromo.disabled = false;
    }
  }

  // Функция запуска анимации загрузки
  function startLoadingSystem() {
    setTimeout(() => { brandPuhosos.style.opacity = '1'; }, 200);

    setTimeout(() => {
      brandGame.style.opacity = '1';
      progressContainer.style.display = 'block';
      
      setTimeout(() => {
        progressBar.style.width = '4%';
        setTimeout(() => {
          progressBar.style.width = '6%';
          setTimeout(() => {
            progressBar.style.width = '19%';
            setTimeout(() => {
              progressBar.style.width = '100%';
              setTimeout(() => {
                loadingScreen.style.display = 'none';
                menuScreen.style.display = 'flex';
              }, 5000);
            }, 3000);
          }, 7000);
        }, 2000);
      }, 5000);
    }, 5000);
  }

  let animationState = true; 
  let touchHoldTimer;

  menuScreen.addEventListener('pointerdown', (e) => {
    if (e.target !== menuScreen) return;
    touchHoldTimer = setTimeout(() => {
      menuScreen.style.animationPlayState = 'paused';
      animationState = false;
    }, 300);
  });

  menuScreen.addEventListener('pointerup', () => { clearTimeout(touchHoldTimer); });

  menuScreen.addEventListener('click', (e) => {
    if (e.target !== menuScreen) return;
    if (!animationState) {
      menuScreen.style.animationPlayState = 'running';
      animationState = true;
    }
  });

  btnShop.addEventListener('click', () => {
    updateShopButtonState();
    shopModal.style.display = 'flex';
  });
  shopClose.addEventListener('click', () => { shopModal.style.display = 'none'; });

  btnTasks.addEventListener('click', () => {
    renderTasks();
    tasksModal.style.display = 'flex';
  });
  tasksClose.addEventListener('click', () => { tasksModal.style.display = 'none'; });

  btnBuyPromo.addEventListener('click', () => {
    if (iceBalance >= 499) {
      iceBalance -= 499;
      scoreMultiplier = 2;
      isMultiplierBought = true;
      saveCurrentData();
      updateMenuUI();
      updateShopButtonState();
      alert(t('dynamic_strings', 'alert_booster_bought'));
      shopModal.style.display = 'none';
    } else {
      alert(t('dynamic_strings', 'alert_no_ice'));
    }
  });

  function updateMenuUI() {
    balanceText.textContent = iceBalance;
  }

  btnPlay.addEventListener('click', () => {
    menuScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    setupNewMatch();
  });

  function setupNewMatch() {
    isPlaying = true;
    currentMatchScore = 0;
    randomTarget = Math.floor(Math.random() * 61) + 40; 
    
    currentX = window.innerWidth / 2;
    currentY = window.innerHeight / 2;
    targetX = currentX;
    targetY = currentY;
    currentAngle = 0;
    
    puhososImg.style.left = `${currentX}px`;
    puhososImg.style.top = `${currentY}px`;
    puhososImg.style.transform = `translate(-50%, -50%) rotate(0deg)`;
    
    refreshGameCounters();
    activeSnowflakes.forEach(item => item.remove());
    activeSnowflakes = [];
    
    generateSnowflakesWave();
    gameSpawnInterval = setInterval(() => {
      if (isPlaying) generateSnowflakesWave();
    }, 2000);
  }

  function refreshGameCounters() {
    gameTopText.textContent = `${currentMatchScore}/${randomTarget}`;
    gameBottomText.textContent = `${currentMatchScore} ❄️ ` + (currentLang === 'ru' ? 'собрано.' : 'collected.');
  }

  function generateSnowflakesWave() {
    for (let i = 0; i < 20; i++) {
      const snowflake = document.createElement('div');
      snowflake.className = 'snowflake';
      snowflake.textContent = '❄️';
      
      const posX = Math.random() * (window.innerWidth - 40) + 20;
      const posY = Math.random() * (window.innerHeight - 140) + 70;
      
      snowflake.style.left = `${posX}px`;
      snowflake.style.top = `${posY}px`;
      
      gameScreen.appendChild(snowflake);
      activeSnowflakes.push(snowflake);
    }
  }

  gameScreen.addEventListener('pointermove', (e) => {
    if (!isPlaying) return;
    targetX = e.clientX;
    targetY = e.clientY;
  });

  function updateMovementLoop() {
    if (isPlaying) {
      let dx = targetX - currentX;
      let dy = targetY - currentY;
      
      currentX += dx * moveSpeed;
      currentY += dy * moveSpeed;
      
      if (Math.hypot(dx, dy) > 1) {
        let targetAngle = Math.atan2(dy, dx) * 180 / Math.PI;
        let angleDiff = targetAngle - currentAngle;
        
        while (angleDiff < -180) angleDiff += 360;
        while (angleDiff > 180) angleDiff -= 360;
        
        currentAngle += angleDiff * 0.1;
      }
      
      puhososImg.style.left = `${currentX}px`;
      puhososImg.style.top = `${currentY}px`;
      puhososImg.style.transform = `translate(-50%, -50%) rotate(${currentAngle}deg)`;
      
      detectSnowflakeCollision(currentX, currentY);
    }
    requestAnimationFrame(updateMovementLoop);
  }
  requestAnimationFrame(updateMovementLoop);

  function detectSnowflakeCollision(x, y) {
    const catchRadius = 55; 
    for (let i = activeSnowflakes.length - 1; i >= 0; i--) {
      const el = activeSnowflakes[i];
      const elX = parseFloat(el.style.left);
      const elY = parseFloat(el.style.top);
      
      const distance = Math.hypot(x - elX, y - elY);
      if (distance < catchRadius) {
        el.remove();
        activeSnowflakes.splice(i, 1);
        currentMatchScore += scoreMultiplier;
        refreshGameCounters();
        
        if (currentMatchScore >= randomTarget) {
          triggerWin();
          break;
        }
      }
    }
  }

  function updateTasksProgress(matchScore) {
    const dynStrings = t('dynamic_strings');
    playerTasks.forEach(task => {
      if (task.completed) return;
      if (task.type === 'collect') {
        task.current += matchScore;
      } else if (task.type === 'round') {
        task.current += 1;
      }
      if (task.current >= task.target) {
        task.current = task.target;
        task.completed = true;
        const taskBonus = task.target * 3;
        iceBalance += taskBonus;
        alert(`${dynStrings.alert_task_done_title} "${task.text}"${dynStrings.alert_task_bonus} +${taskBonus} 🧊!`);
      }
    });

    const allCompleted = playerTasks.every(t => t.completed);
    if (allCompleted) {
      setTimeout(() => {
        alert(dynStrings.alert_all_tasks_done);
        generateNewTasksList();
      }, 500);
    }
  }

  function triggerWin() {
    isPlaying = false;
    clearInterval(gameSpawnInterval);
    iceBalance += currentMatchScore;
    updateTasksProgress(currentMatchScore);

    scoreMultiplier = 1;
    isMultiplierBought = false;
    saveCurrentData();
    
    setTimeout(() => {
      const dynStrings = t('dynamic_strings');
      alert(`${dynStrings.alert_win_prefix}${currentMatchScore}${dynStrings.alert_win_suffix}`);
      gameScreen.style.display = 'none';
      menuScreen.style.display = 'flex';
      updateMenuUI();
    }, 150);
  }
</script>
</body>
</html>
